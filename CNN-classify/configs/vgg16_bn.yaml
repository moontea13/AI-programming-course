# VGG16-BN config for CIFAR-10
method: vgg16_bn

model:
  name: VGG16BN
  params:
    num_classes: 10
    dropout: 0.3

training:
  epochs: 150
  batch_size: 128
  seed: 42
  num_workers: 0
  val_split: 0.1

optimizer:
  name: sgd
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005

scheduler:
  name: step
  step_size: 40
  gamma: 0.1

early_stopping:
  patience: 20
  min_delta: 0.001

data:
  dir: dataset
