# ResNet-20 config for CIFAR-10
method: resnet20

model:
  name: ResNet20
  params:
    num_classes: 10

training:
  epochs: 150
  batch_size: 128
  seed: 42
  num_workers: 0
  val_split: 0.1

optimizer:
  name: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0001

scheduler:
  name: step
  step_size: 40
  gamma: 0.2

early_stopping:
  patience: 20
  min_delta: 0.001

data:
  dir: dataset
